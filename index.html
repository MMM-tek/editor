<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MakeCode Style Editor</title>
    <!-- Cargamos Blockly -->
    <script>import * as Blockly from 'blockly';
window.Blockly = Blockly; // Esto lo hace global
</script>
    <style>
        body { margin: 0; display: flex; flex-direction: column; height: 100vh; background: #1e1e1e; font-family: sans-serif; }
        #header { padding: 15px; background: #2d2d2d; color: white; border-bottom: 2px solid #3d3d3d; font-weight: bold; }
        #blocklyDiv { flex-grow: 1; width: 100%; }
    </style>
</head>
<body>

<div id="header">BLOCK EDITOR</div>
<div id="blocklyDiv"></div>

<xml id="toolbox" style="display: none">
    <category name="Commands" colour="#5B67A5" id="tsCategory"></category>
</xml>

<script id="blocks-source" type="text/plain">
/**
 * DEFINE TUS BLOQUES AQUÍ ABAJO
 * Usa //% block="texto" y //% color="#hex"
 */

//% block="say %message"
//% color="#4a90e2"
export function say(message: string) {}

//% block="set speed to %value"
//% color="#e67e22"
export function setSpeed(value: number) {}

//% block="teleport to x: %x y: %y"
//% color="#9b59b6"
export function teleport(x: number, y: number) {}
</script>

<script>
    import * as Blockly from 'blockly';
// --- EL MOTOR QUE CREA LOS BLOQUES ---

function parseAndCreateBlocks() {
    const source = document.getElementById('blocks-source').innerText;
    
    // Buscamos: //% block="...", //% color="...", function nombre(params)
    const regex = /\/\/% block="(.+?)"\s+\/\/% color="(.+?)"\s+export function (\w+)\((.*?)\)/gs;
    let match;

    while ((match = regex.exec(source)) !== null) {
        const [_, blockText, color, funcName, paramsRaw] = match;
        
        // Detectar tipos de parámetros (string o number)
        const params = paramsRaw.split(',').filter(p => p.trim()).map(p => {
            return p.includes('string') ? 'text' : 'number';
        });

        // Registrar el bloque en Blockly
        Blockly.Blocks[funcName] = {
            init: function() {
                let parts = blockText.split(/%\w+/);
                let input = this.appendDummyInput();
                parts.forEach((p, i) => {
                    input.appendField(p.trim());
                    if (i < params.length) {
                        if (params[i] === 'text') {
                            input.appendField(new Blockly.FieldTextInput("abc"), "VAR" + i);
                        } else {
                            input.appendField(new Blockly.FieldNumber(0), "VAR" + i);
                        }
                    }
                });
                this.setPreviousStatement(true, null);
                this.setNextStatement(true, null);
                this.setColour(color);
            }
        };

        // Añadir a la toolbox
        const blockNode = document.createElement('block');
        blockNode.setAttribute('type', funcName);
        document.getElementById('tsCategory').appendChild(blockNode);
    }
}

// Iniciar
parseAndCreateBlocks();

Blockly.inject('blocklyDiv', {
    toolbox: document.getElementById('toolbox'),
    theme: Blockly.Themes.Dark,
    trashcan: true
});
</script>
</body>
</html>
